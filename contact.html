<body>
    <!-- header section -->
     <header>
        <h2>Holiday Travels</h2>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="./about.html">About</a></li>
                <li><a href="./destinations.html">Destinations</a></li>
                <li><a href="./packages.html">Packages</a></li>
                <li><a href="./contact.html">Contact Us</a></li>
            </ul>
            <i class="fa-solid fa-bars"></i>
        </nav>
    </header>
    <div class="hamburger"></div>

    <!-- icons to navigate to other pages using icon -->

       <a href="index.html"><i class="fa-solid fa-house"></i></a>

    <main>
    <section class="hero">
      <h1>Plan Your Journey</h1>
      <div class="overlay"></div>
    </section>
    <!--Contact Section-->
    <section class="contact-container">
      
      <!--Form -->
        <div class="form-section">
            <h2>Book Your Trip</h2>
            
            <form>
                <input type="text" placeholder="Full name" required>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Phone">
                <select>
                    <option> Preferred Destination</option>
                    <option>Paris,France</option>
                    <option>Bali,Indonesia</option>
                    <option>Tokyo,Japan</option>
                </select>
                <label>Travel Dates</label>
                <input type="date">
                <input type="date">
                <input type="number" placeholder="Number of Travelers">
                <select>
                    <option>Budget Range</option>
                    <option>$500 - $1000</option>
                    <option>$1000 - $3000</option>
                </select>
                <textarea placeholder="Special Requests"></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>

          <!-- INFO -->
        <div class="info-section">
            <h2>Contact Info</h2>

            <p><i class="fa-solid fa-map-pin"></i> Turing Tech, Enugu</p>
            <p><i class="fa-solid fa-phone"></i> +234 800 000 0000</p>
            <p><i class="fa-regular fa-envelope"></i> info@travel.com</p>
            <p><i class="fa-regular fa-clock"></i> Mon - Fri: 9am - 5pm</p>

            <div class="socials">
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
            </div>
            
            <!--Map-->
            
            <iframe 
                src="https://www.google.com/maps?q=Enugu&output=embed"
                width="100%" 
                height="300" 
                style="border:0;" 
                loading="lazy">
            </iframe>
        </div>
    </section>
