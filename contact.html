<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Page</title>

    <!-- css base links -->
     <link rel="stylesheet" href="./css/base/reset.css">
     <link rel="stylesheet" href="./css/base/colors.css">
     <link rel="stylesheet" href="./css/base/typography.css">
     <link rel="stylesheet" href="./css/layout/header.css">
     <link rel="stylesheet" href="./css/layout/footer.css">
     <!-- css conatct page style -->
      <link rel="stylesheet" href="./css/homepage/contact.css">

     <!-- fontawesome -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <!-- header section -->
     <header>
        <h2>Holiday Travels</h2>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="./about.html">About</a></li>
                <li><a href="./destinations.html">Destinations</a></li>
                <li><a href="./packages.html">Packages</a></li>
                <li><a href="./contact.html">Contact Us</a></li>
            </ul>
            <i class="fa-solid fa-bars"></i>
        </nav>
    </header>
    <div class="hamburger">
     </div>

     <main class="contact-container">
        <section class="contact-hero">
            <h1>Plan Your Next Trip With Us</h1>
        </section>

        <section class="contact-grid">
            <div class="form-field">
                <h2>Booking Inquiry Form</h2>
                <input type="text" placeholder="Full Name">
                <input type="email" placeholder="Email">
                <input type="tel" placeholder="Contact">
                <select>
                    <option value="">Prefered Location</option>
                    <option value="USA">United States</option>
                    <option value="LONDON">LONDON</option>
                    <option value="NIGERIA">NIGERIA</option>
                    <option value="GERMANY">GERMANY</option>
                </select>
                <div class="date-field">
                    <label for="date">Travel Date</label>
                    <input type="date" id="date">
                </div>
                <input type="number" placeholder="No of Travelers">
                 <select>
                    <option value="">Whats Your Budget</option>
                    <option value="$450,00">$450,00</option>
                    <option value="$90,000">$90,000</option>
                    <option value="$20,000">$20,000</option>
                    <option value="Free Flight">Free Flight</option>
                </select>
                <textarea cols="3" rows="6" placeholder="Special Request..."></textarea>
                <button type="submit">Submit</button>
            </div>

            <div class="contact-info">
                <div class="info">
                    <i class="fa-regular fa-address-book"></i>
                    <span>No 10 One Day, Agbani Road, Enugu</span>
                </div>
                <div class="info">
                    <i class="fa-solid fa-phone"></i>
                    <span>+234 8103-919717</span>
                </div>
                <div class="info">
                    <i class="fa-solid fa-business-time"></i>
                    <span>Open 8am - 4pm Daily</span>
                </div>
                <div class="socilas">
                    <div class="social">
                        <i class="fa-brands fa-facebook-f"></i>
                        <span>Facebook</span>
                    </div>
                    <div class="social">
                       <i class="fa-brands fa-instagram"></i>
                        <span>Instagram</span>
                    </div>
                </div>
            </div>

        </section>

     </main>



     <footer>
        <p>&copy; 2026 developed by group 3. All rights reserved</p>
     </footer>  
</body>
</html>
